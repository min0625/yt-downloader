name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact-name: windows-exe
          - os: macos-latest
            artifact-name: macos-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up mise
        uses: jdx/mise-action@v2

      - name: Sync environment
        run: mise run sync

      - name: Pack
        run: mise run pack

      - name: Compress macOS app bundle
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r "YT-Downloader-macOS.zip" "YT Downloader.app"

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/yt-downloader.exe

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/YT-Downloader-macOS.zip

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: release-assets

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-app
          path: release-assets

      - name: Delete existing nightly release and tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete nightly --yes --cleanup-tag 2>/dev/null || true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          DATE=$(date +'%Y-%m-%d')
          gh release create nightly \
            --title "Nightly Build ${DATE} (${SHORT_SHA})" \
            --prerelease \
            --generate-notes \
            release-assets/yt-downloader.exe \
            "release-assets/YT-Downloader-macOS.zip"
